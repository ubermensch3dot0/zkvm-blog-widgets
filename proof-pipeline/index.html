<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Proof Pipeline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0d1117; overflow: hidden; }
  body { display: flex; justify-content: center; padding: 24px 16px; }
  svg { max-width: 520px; width: 100%; height: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 520 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="7" markerHeight="5.5" orient="auto">
      <path d="M0 0L10 3.5L0 7z" fill="#30363d"/>
    </marker>
  </defs>

  <!-- ═══ VM SIDE bracket ═══ -->
  <path d="M 28 42 L 18 42 L 18 318 L 28 318" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
  <text x="14" y="183" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600" letter-spacing="0.06em"
        transform="rotate(-90,14,183)" font-family="'SF Mono','Fira Code',monospace">VM SIDE</text>

  <!-- ═══ Step 1 ═══ -->
  <circle cx="60" cy="56" r="14" fill="#161b22" stroke="#58a6ff" stroke-width="1.3"/>
  <text x="60" y="60" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700" font-family="'SF Mono',monospace">1</text>
  <text x="88" y="53" fill="#e6edf3" font-size="13" font-weight="600">Execute the program on the VM</text>
  <text x="88" y="69" fill="#484f58" font-size="11">Run fetch-decode-execute loop</text>

  <!-- Wire -->
  <line x1="60" y1="70" x2="60" y2="96" stroke="#30363d" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- ═══ Step 2 ═══ -->
  <circle cx="60" cy="112" r="14" fill="#161b22" stroke="#58a6ff" stroke-width="1.3"/>
  <text x="60" y="116" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700" font-family="'SF Mono',monospace">2</text>
  <text x="88" y="109" fill="#e6edf3" font-size="13" font-weight="600">Record the execution trace</text>
  <text x="88" y="125" fill="#484f58" font-size="11">A table of machine states, one row per cycle</text>

  <!-- Wire -->
  <line x1="60" y1="126" x2="60" y2="152" stroke="#30363d" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- ═══ Step 3 ═══ -->
  <circle cx="60" cy="168" r="14" fill="#161b22" stroke="#ffa657" stroke-width="1.3"/>
  <text x="60" y="172" text-anchor="middle" fill="#ffa657" font-size="11" font-weight="700" font-family="'SF Mono',monospace">3</text>
  <text x="88" y="165" fill="#e6edf3" font-size="13" font-weight="600">Encode each column as a polynomial</text>
  <text x="88" y="181" fill="#484f58" font-size="11">Lagrange interpolation over trace domain</text>

  <!-- Wire -->
  <line x1="60" y1="182" x2="60" y2="208" stroke="#30363d" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- ═══ Step 4 ═══ -->
  <circle cx="60" cy="224" r="14" fill="#161b22" stroke="#ffa657" stroke-width="1.3"/>
  <text x="60" y="228" text-anchor="middle" fill="#ffa657" font-size="11" font-weight="700" font-family="'SF Mono',monospace">4</text>
  <text x="88" y="221" fill="#e6edf3" font-size="13" font-weight="600">Express VM rules as constraints</text>
  <text x="88" y="237" fill="#484f58" font-size="11">Polynomial equations that must equal zero</text>

  <!-- ═══ Divider ═══ -->
  <line x1="40" y1="268" x2="500" y2="268" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="195" y="256" width="130" height="24" rx="6" fill="#0d1117"/>
  <text x="260" y="272" text-anchor="middle" fill="#30363d" font-size="10" font-weight="600" letter-spacing="0.06em"
        font-family="'SF Mono','Fira Code',monospace">ALGEBRA &#x2192; CRYPTO</text>

  <!-- Wire across divider -->
  <line x1="60" y1="238" x2="60" y2="296" stroke="#30363d" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- ═══ PROOF SIDE bracket ═══ -->
  <path d="M 28 298 L 18 298 L 18 508 L 28 508" fill="none" stroke="#d2a8ff" stroke-width="1.5" stroke-linecap="round"/>
  <text x="14" y="406" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="600" letter-spacing="0.06em"
        transform="rotate(-90,14,406)" font-family="'SF Mono','Fira Code',monospace">PROOF SIDE</text>

  <!-- ═══ Step 5 ═══ -->
  <circle cx="60" cy="312" r="14" fill="#161b22" stroke="#d2a8ff" stroke-width="1.3"/>
  <text x="60" y="316" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="700" font-family="'SF Mono',monospace">5</text>
  <text x="88" y="309" fill="#e6edf3" font-size="13" font-weight="600">Prove all constraints hold</text>
  <text x="88" y="325" fill="#484f58" font-size="11">Commit, quotient, FRI &rarr; succinct STARK proof</text>

  <!-- Wire -->
  <line x1="60" y1="326" x2="60" y2="352" stroke="#30363d" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- ═══ Step 6 ═══ -->
  <circle cx="60" cy="368" r="14" fill="#161b22" stroke="#3fb950" stroke-width="1.3"/>
  <text x="60" y="372" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="'SF Mono',monospace">6</text>
  <text x="88" y="365" fill="#e6edf3" font-size="13" font-weight="600">Verifier checks a handful of spot-checks</text>
  <text x="88" y="381" fill="#484f58" font-size="11">Never re-executes the program</text>

  <!-- ═══ Bottom annotations ═══ -->
  <!-- VM side note -->
  <rect x="56" y="424" width="210" height="40" rx="8" fill="#161b22" stroke="#58a6ff30" stroke-width="1"/>
  <text x="161" y="442" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="500">Steps 1-4: we build in full detail</text>
  <text x="161" y="456" text-anchor="middle" fill="#484f58" font-size="9.5">ZKVM-specific engineering</text>

  <!-- Proof side note -->
  <rect x="282" y="424" width="210" height="40" rx="8" fill="#161b22" stroke="#d2a8ff30" stroke-width="1"/>
  <text x="387" y="442" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="500">Steps 5-6: generic STARK infra</text>
  <text x="387" y="456" text-anchor="middle" fill="#484f58" font-size="9.5">Shared across all STARK systems</text>

</svg>
</body>
</html>
