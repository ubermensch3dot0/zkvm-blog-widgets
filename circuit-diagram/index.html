<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arithmetic Circuit: x² + x + 5</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0d1117; overflow: hidden; }
  body { display: flex; justify-content: center; align-items: center; padding: 24px 16px; }
  svg { max-width: 420px; width: 100%; height: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 400 440" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace">
  <defs>
    <marker id="a" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="7" markerHeight="5.5" orient="auto">
      <path d="M0 0L10 3.5L0 7z" fill="#484f58"/>
    </marker>
  </defs>

  <!-- ═══ TOP ROW: inputs ═══ -->
  <!-- x -->
  <circle cx="100" cy="50" r="26" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="100" y="56" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="600">x</text>

  <!-- 5 -->
  <circle cx="300" cy="50" r="26" fill="none" stroke="#ffa657" stroke-width="1.5"/>
  <text x="300" y="56" text-anchor="middle" fill="#ffa657" font-size="16" font-weight="600">5</text>

  <!-- ═══ MIDDLE ROW: MUL and ADD gates ═══ -->
  <!-- MUL gate (x · x = x²) -->
  <circle cx="100" cy="190" r="26" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="100" y="197" text-anchor="middle" fill="#d2a8ff" font-size="20" font-weight="700">&times;</text>
  <text x="100" y="228" text-anchor="middle" fill="#8b949e" font-size="11">x&sup2;</text>

  <!-- ADD gate (x + 5) -->
  <circle cx="300" cy="190" r="26" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="300" y="197" text-anchor="middle" fill="#d2a8ff" font-size="20" font-weight="700">+</text>
  <text x="300" y="228" text-anchor="middle" fill="#8b949e" font-size="11">x + 5</text>

  <!-- ═══ BOTTOM: final ADD (output) ═══ -->
  <circle cx="200" cy="340" r="30" fill="#161b22" stroke="#3fb950" stroke-width="1.8"/>
  <text x="200" y="347" text-anchor="middle" fill="#3fb950" font-size="22" font-weight="700">+</text>
  <text x="200" y="386" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="500">y = x&sup2; + x + 5</text>

  <!-- ═══ WIRES: top → middle ═══ -->
  <!-- x → MUL (left input) -->
  <line x1="84" y1="76" x2="84" y2="162" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- x → MUL (right input) -->
  <line x1="116" y1="76" x2="116" y2="162" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- x → ADD(x+5) left input -->
  <line x1="124" y1="60" x2="278" y2="178" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 5 → ADD(x+5) right input -->
  <line x1="300" y1="76" x2="300" y2="162" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ WIRES: middle → bottom ═══ -->
  <!-- MUL(x²) → final ADD left input -->
  <line x1="118" y1="210" x2="178" y2="318" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ADD(x+5) → final ADD right input -->
  <line x1="282" y1="210" x2="222" y2="318" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

</svg>
</body>
</html>
